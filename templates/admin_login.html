<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; background: #f5f5f5; padding: 20px; }
        h1 { color: #333; }
        .formulario { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; width: 100%; box-sizing: border-box; margin-bottom: 12px; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; background: #2196F3; color: white; width: 100%; }
        .error { color: #ff4d4d; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <h1>⚙️ Admin</h1>
    <div class="formulario">
        <form action="/admin-login" method="POST">
            {% if error %}<p class="error">{{ error }}</p>{% endif %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Entrar</button>
        </form>
    </div>
</body>
</html>
