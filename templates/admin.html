<!DOCTYPE html>
<html>
<head>
    <title>Panel del Entrenador</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1, h2 { color: #333; }
        .ejercicio {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nombre { font-size: 18px; font-weight: bold; color: #222; }
        .series { font-size: 15px; color: #888; }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }
        .btn-rojo { background-color: #ff4d4d; color: white; }
        .btn-verde { background-color: #4CAF50; color: white; }
        .btn-azul { background-color: #2196F3; color: white; }
        .formulario {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 15px;
            margin-right: 8px;
            width: 200px;
        }
        .links {
            margin-bottom: 20px;
        }
        .links a {
            margin-right: 12px;
            color: #2196F3;
            text-decoration: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <h1>⚙️ Panel del Entrenador</h1>

    <div class="links">
        <a href="/">← Ver rutina del cliente</a>
        <a href="/resetear" class="btn btn-azul">🔄 Resetear checkboxes</a>
    </div>

    <h2>Agregar ejercicio</h2>
    <div class="formulario">
        <form action="/agregar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre del ejercicio" required>
            <input type="text" name="series" placeholder="Ej: 3 x 12" required>
            <button type="submit" class="btn btn-verde">+ Agregar</button>
        </form>
    </div>

    <h2>Rutina actual</h2>
    {% for ejercicio in rutina %}
    <div class="ejercicio">
        <span class="nombre">{{ ejercicio.nombre }}</span>
        <span class="series">{{ ejercicio.series }}</span>
        <a href="/eliminar/{{ ejercicio.id }}" class="btn btn-rojo">🗑 Eliminar</a>
    </div>
    {% endfor %}

</body>
</html>
